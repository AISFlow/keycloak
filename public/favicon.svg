<!--
  AISFlow favicon — same brand identity as auth-logo, but stripped of
  the AIS/FLOW text because at 16×16 / 32×32 the lettering is illegible
  and just adds visual noise. Navy disc + orange swoosh remains
  recognisable as AISFlow at any size; full wordmark lives in
  auth-logo.svg / aisflow-wordmark.svg.
-->
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" fill="none">
    <rect width="48" height="48" rx="10" fill="white" />
    <circle cx="24" cy="24" r="18" fill="#1B2D5E" />
    <path
        d="M10 27 C 16 22, 22 27, 26 25 S 35 21, 40 20"
        stroke="#F97316" stroke-width="3.5" stroke-linecap="round" fill="none"
    />
</svg>
