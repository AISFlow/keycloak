name: Setup toolchain
description: |
    Pins pnpm 10 / Node 24 / (optional) Temurin 21 across all CI jobs and
    runs `pnpm install --frozen-lockfile`. Also restores
    `node_modules/keycloakify-dev-resources` so the postinstall
    `keycloakify sync-extensions` step doesn't refetch on every run.

inputs:
    java:
        description: "Install Temurin Java 21 (set 'false' to skip)."
        required: false
        default: "true"
    install:
        description: "Run `pnpm install --frozen-lockfile` (set 'false' to skip)."
        required: false
        default: "true"

runs:
    using: composite
    steps:
        - uses: pnpm/action-setup@v6
          with:
              version: 10

        - uses: actions/setup-node@v6
          with:
              node-version: 24
              cache: pnpm

        - if: inputs.java == 'true'
          uses: actions/setup-java@v5
          with:
              distribution: temurin
              java-version: 21

        - if: inputs.install == 'true'
          uses: actions/cache@v5
          with:
              path: node_modules/keycloakify-dev-resources
              key: ${{ runner.os }}-kc-dev-resources-${{ hashFiles('pnpm-lock.yaml', '.keycloak-versions') }}
              restore-keys: |
                  ${{ runner.os }}-kc-dev-resources-

        - if: inputs.install == 'true'
          shell: bash
          run: pnpm install --frozen-lockfile

        # Belt-and-suspenders: regenerate the keycloakify-managed sources
        # (e.g. `src/login/mocks/KcPageStory.tsx`, `getKcContextMock.ts`)
        # explicitly. These files are gitignored in `src/.gitignore` and
        # are normally produced by the `postinstall` script, but in some
        # CI conditions (cache restore + frozen lockfile) the postinstall
        # has been observed to skip the src/ sync — leaving `tsc -b` to
        # fail with TS2307 on the mock imports. Running sync-extensions
        # explicitly here is idempotent and guarantees the files exist.
        - if: inputs.install == 'true'
          shell: bash
          run: pnpm exec keycloakify sync-extensions
