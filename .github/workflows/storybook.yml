name: storybook

on:
    pull_request:
        branches:
            - main
        # Storybook only consumes UI source + its own config + dependency
        # graph. Doc/CI/infra-only PRs don't need a 5-min storybook build.
        # NOTE: pair with branch-protection adjustments if `Build Storybook`
        # is a required check (path-skipped runs are reported as missing).
        paths:
            - "src/**"
            - ".storybook/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/storybook.yml"

permissions:
    contents: read

concurrency:
    group: storybook-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build Storybook
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/setup-toolchain
              with:
                  java: "false"

            # FIXME: keycloakify v11 + storybook 10 race condition leaks
            # `EEXIST: ...keycloakify-dev-resources/.../jquery/dist`.
            # Retry up to 3× with UV_THREADPOOL_SIZE=1 instead of
            # `continue-on-error: true` so a real (non-race) failure
            # actually fails CI.
            - name: Build Storybook (retry on race)
              env:
                  UV_THREADPOOL_SIZE: "1"
              run: |
                  set +e
                  for attempt in 1 2 3; do
                      echo "::group::storybook build attempt ${attempt}/3"
                      pnpm run build-storybook
                      rc=$?
                      echo "::endgroup::"
                      if [ "$rc" -eq 0 ]; then
                          exit 0
                      fi
                      echo "::warning::storybook build attempt ${attempt} failed (rc=${rc})"
                  done
                  echo "::error::storybook build failed after 3 attempts"
                  exit 1

            - name: Upload Storybook artifact
              uses: actions/upload-artifact@v7
              with:
                  name: storybook-static
                  path: storybook-static/
                  retention-days: 7
