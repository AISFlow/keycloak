name: storybook

# Validate that Storybook still builds for UI changes. The artifact is
# kept for 7 days so reviewers can download static HTML if needed.

on:
    pull_request:
        branches: [main]
        # Only fire when something Storybook actually consumes changes.
        # NOTE: pair with branch-protection adjustments if `Build Storybook`
        # is a required check — path-skipped runs are reported as missing.
        paths:
            - "src/**"
            - ".storybook/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - ".github/workflows/storybook.yml"
            - ".github/actions/setup-toolchain/**"

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build Storybook
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/setup-toolchain
              with:
                  java: "false"

            # FIXME: keycloakify v11 + storybook 10 race condition leaks
            # `EEXIST: ...keycloakify-dev-resources/.../jquery/dist`.
            # Retry up to 3× with UV_THREADPOOL_SIZE=1 so a real (non-race)
            # failure surfaces — `continue-on-error: true` used to mask it.
            - name: Build Storybook (retry on race)
              env:
                  UV_THREADPOOL_SIZE: "1"
              run: |
                  for attempt in 1 2 3; do
                      echo "::group::storybook build attempt ${attempt}/3"
                      if pnpm run build-storybook; then
                          echo "::endgroup::"
                          exit 0
                      fi
                      echo "::endgroup::"
                      echo "::warning::storybook build attempt ${attempt} failed"
                  done
                  echo "::error::storybook build failed after 3 attempts"
                  exit 1

            - name: Upload Storybook artifact
              uses: actions/upload-artifact@v7
              with:
                  name: storybook-static
                  path: storybook-static/
                  retention-days: 7
