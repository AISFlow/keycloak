name: docker-kc

# ════════════════════════════════════════════════════════════════════
# KC base bump → rebake images on the new KC version using the LATEST
# already-released theme jar.
#
# Fires ONLY when:
#   • `.keycloak-versions` is changed on main
#   • Dockerfile / docker-build infra is changed on main
#   • someone manually dispatches
#
# Theme code changes do NOT fire here — those go through ci.yml's
# verify→release→docker pipeline.
# ════════════════════════════════════════════════════════════════════

on:
    push:
        branches: [main]
        paths:
            - ".keycloak-versions"
            - "Dockerfile"
            - ".dockerignore"
            - ".github/workflows/_docker-build.yml"
            - ".github/workflows/docker-kc.yml"
            - ".github/actions/keycloak-version/**"
    pull_request:
        branches: [main]
        paths:
            - ".keycloak-versions"
            - "Dockerfile"
            - ".dockerignore"
            - ".github/workflows/_docker-build.yml"
            - ".github/workflows/docker-kc.yml"
            - ".github/actions/keycloak-version/**"
    workflow_dispatch:
        inputs:
            theme_version:
                description: "Theme release tag to bake (e.g. 1.2.3). Empty = latest."
                required: false
                type: string

permissions:
    contents: read
    packages: write

concurrency:
    group: docker-kc-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Rebuild on KC bump
        uses: ./.github/workflows/_docker-build.yml
        with:
            theme_version: ${{ inputs.theme_version || '' }}
            push: ${{ github.event_name != 'pull_request' }}
