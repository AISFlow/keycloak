name: _docker-build

# Reusable: discover KC matrix + fetch theme jar + multi-arch build/push.
# Called from:
#   • ci.yml         (theme code path: verify → release → here)
#   • docker-kc.yml  (KC bump path: .keycloak-versions changed)
#
# `theme_version` input controls the jar source:
#   • empty       → latest GitHub Release (KC bump scenario)
#   • semver      → that exact release (theme dispatch / explicit pin)
#   • the caller may also let this fire from a `tag-push` ref where the
#     resolver picks the tag itself.
#
# Architecture strategy:
#   amd64 and arm64 build on their NATIVE GitHub-hosted runners
#   (`ubuntu-latest` and `ubuntu-24.04-arm`) — no QEMU emulation. On
#   push, each platform pushes by digest only; a separate `merge` job
#   stitches digests into a single multi-arch tag list.

on:
    workflow_call:
        inputs:
            theme_version:
                description: "Theme release tag to bake (e.g. 1.2.3). Empty = latest."
                type: string
                required: false
                default: ""
            push:
                description: "Whether to push to GHCR (false for PR validation)."
                type: boolean
                required: false
                default: true

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/keycloak
    THEME_JAR_NAME: keycloak-theme-for-kc-all-other-versions.jar

jobs:
    discover:
        name: Resolve versions & fetch theme jar
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
            matrix: ${{ steps.kc.outputs.matrix }}
            kc_primary: ${{ steps.kc.outputs.version }}
            theme_version: ${{ steps.theme.outputs.version }}
            theme_source: ${{ steps.theme.outputs.source }}
        steps:
            - uses: actions/checkout@v6

            - name: Resolve Keycloak versions
              id: kc
              uses: ./.github/actions/keycloak-version

            - name: Resolve theme version
              id: theme
              env:
                  GH_TOKEN: ${{ github.token }}
                  INPUT_VERSION: ${{ inputs.theme_version }}
              run: |
                  set -euo pipefail
                  if [[ -n "${INPUT_VERSION:-}" ]]; then
                      v="$INPUT_VERSION"
                      src="caller-input"
                  elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                      v="${GITHUB_REF#refs/tags/v}"
                      src="tag-push"
                  else
                      v=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name | sub("^v"; "")' 2>/dev/null || true)
                      if [[ -z "$v" || "$v" == "null" ]]; then
                          echo "::error::no theme release found — create v0.0.1 (or later) on the theme repo first"
                          exit 1
                      fi
                      src="latest-release"
                  fi
                  if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
                      echo "::error::invalid theme version '$v'"
                      exit 1
                  fi
                  {
                      echo "version=$v"
                      echo "source=$src"
                  } >> "$GITHUB_OUTPUT"
                  echo "::notice title=Theme version::$v ($src)"

            - name: Download theme jar from GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  mkdir -p artifacts
                  v="${{ steps.theme.outputs.version }}"
                  echo "::group::gh release download v$v"
                  gh release download "v$v" \
                      -R "$GITHUB_REPOSITORY" \
                      -p "$THEME_JAR_NAME" \
                      -O "artifacts/aisflow.jar"
                  echo "::endgroup::"
                  ls -lh artifacts/

            - name: Upload theme jar artifact
              uses: actions/upload-artifact@v7
              with:
                  name: theme-jar
                  path: artifacts/aisflow.jar
                  retention-days: 1
                  if-no-files-found: error

            - name: Summary
              run: |
                  {
                      echo "## Discover"
                      echo ""
                      echo "| | value |"
                      echo "|---|---|"
                      echo "| KC primary | \`${{ steps.kc.outputs.version }}\` |"
                      echo "| KC supported | \`${{ steps.kc.outputs.versions }}\` |"
                      echo "| Theme version | \`${{ steps.theme.outputs.version }}\` (${{ steps.theme.outputs.source }}) |"
                  } >> "$GITHUB_STEP_SUMMARY"

    # ──────────────────────────────────────────────────────────────
    # Build per (kc × platform) on the native runner. No QEMU.
    #   • push=true  → push by digest only; merge job assembles tags
    #   • push=false → validate-only build per arch (PR path)
    # ──────────────────────────────────────────────────────────────
    build:
        name: kc${{ matrix.kc.major }} ${{ matrix.platform.arch }}
        needs: discover
        runs-on: ${{ matrix.platform.runner }}
        timeout-minutes: 45
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
            THEME_VERSION: ${{ needs.discover.outputs.theme_version }}
        strategy:
            fail-fast: false
            matrix:
                kc: ${{ fromJSON(needs.discover.outputs.matrix) }}
                platform:
                    - { runner: ubuntu-latest, arch: amd64 }
                    - { runner: ubuntu-24.04-arm, arch: arm64 }
        steps:
            - uses: actions/checkout@v6

            - name: Download theme jar
              uses: actions/download-artifact@v8
              with:
                  name: theme-jar
                  path: .ci-artifacts/

            - name: Verify jar present
              run: |
                  ls -lh .ci-artifacts/
                  test -s .ci-artifacts/aisflow.jar

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              if: ${{ inputs.push }}
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Push path: emit a digest the merge job can stitch into a manifest.
            - name: Build and push by digest
              if: ${{ inputs.push }}
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/${{ matrix.platform.arch }}
                  build-args: |
                      KEYCLOAK_VERSION=${{ matrix.kc.version }}
                  outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
                  cache-from: type=gha,scope=kc${{ matrix.kc.major }}-${{ matrix.platform.arch }}
                  cache-to: type=gha,mode=max,scope=kc${{ matrix.kc.major }}-${{ matrix.platform.arch }}
                  provenance: false

            - name: Export digest
              if: ${{ inputs.push }}
              run: |
                  set -euo pipefail
                  mkdir -p "${{ runner.temp }}/digests"
                  digest="${{ steps.build.outputs.digest }}"
                  touch "${{ runner.temp }}/digests/${digest#sha256:}"

            - name: Upload digest
              if: ${{ inputs.push }}
              uses: actions/upload-artifact@v7
              with:
                  name: digests-${{ matrix.kc.version }}-${{ matrix.platform.arch }}
                  path: ${{ runner.temp }}/digests/*
                  if-no-files-found: error
                  retention-days: 1

            # PR path: just validate the Dockerfile builds for this arch.
            - name: Build (validate, no push)
              if: ${{ !inputs.push }}
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/${{ matrix.platform.arch }}
                  build-args: |
                      KEYCLOAK_VERSION=${{ matrix.kc.version }}
                  push: false
                  cache-from: type=gha,scope=kc${{ matrix.kc.major }}-${{ matrix.platform.arch }}
                  cache-to: type=gha,mode=max,scope=kc${{ matrix.kc.major }}-${{ matrix.platform.arch }}
                  provenance: false

    # ──────────────────────────────────────────────────────────────
    # Stitch per-arch digests into a multi-arch manifest list and
    # push under the full tag taxonomy. Push runs only.
    # ──────────────────────────────────────────────────────────────
    merge:
        name: kc${{ matrix.kc.major }} manifest
        needs: [discover, build]
        if: ${{ inputs.push }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            THEME_VERSION: ${{ needs.discover.outputs.theme_version }}
        strategy:
            fail-fast: false
            matrix:
                kc: ${{ fromJSON(needs.discover.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v6

            - name: Download digests
              uses: actions/download-artifact@v8
              with:
                  path: ${{ runner.temp }}/digests
                  pattern: digests-${{ matrix.kc.version }}-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  flavor: |
                      latest=false
                  tags: |
                      # ─────────────────────────────────────────────
                      # Tag taxonomy
                      # ─────────────────────────────────────────────
                      # IMMUTABLE — both versions pinned (recommended for prod)
                      #   <theme>-kc<kc>     (e.g. 1.2.3-kc26.6.1)
                      #
                      # FLOATING — one side floats:
                      #   kc<kc>             KC pinned, theme = latest released
                      #   <theme>            theme pinned (semver tag), KC = primary
                      #   latest             both = latest (primary KC, default branch)
                      #
                      # All immutable variants get an explicit *theme<X>-kc<Y>* twin
                      # so anyone inspecting `docker pull <tag>` knows EXACTLY both
                      # versions even when they came from a `main`-push (floating)
                      # build, not just from a release tag.
                      # ─────────────────────────────────────────────

                      # ── Theme git tag (vX.Y.Z) → fully pinned w/ KC ──
                      type=semver,pattern={{version}},suffix=-kc${{ matrix.kc.version }}
                      type=semver,pattern={{version}},suffix=-kc${{ matrix.kc.line }}
                      type=semver,pattern={{version}},suffix=-kc${{ matrix.kc.major }}
                      type=semver,pattern={{major}}.{{minor}},suffix=-kc${{ matrix.kc.line }}
                      type=semver,pattern={{major}}.{{minor}},suffix=-kc${{ matrix.kc.major }}

                      # ── Theme git tag → bare semver / latest (primary KC only) ──
                      type=semver,pattern={{version}},enable=${{ matrix.kc.is_primary }}
                      type=semver,pattern={{major}}.{{minor}},enable=${{ matrix.kc.is_primary }}
                      type=raw,value=latest,enable=${{ matrix.kc.is_primary && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

                      # ── main branch → KC-pinned floating (theme = latest release) ──
                      type=raw,value=kc${{ matrix.kc.version }},enable={{is_default_branch}}
                      type=raw,value=kc${{ matrix.kc.line }},enable={{is_default_branch}}
                      type=raw,value=kc${{ matrix.kc.major }},enable={{is_default_branch}}

                      # ── main branch → IMMUTABLE both-versions snapshot ──
                      # Records what theme was baked when this KC base was bumped.
                      type=raw,value=${{ env.THEME_VERSION }}-kc${{ matrix.kc.version }},enable={{is_default_branch}}
                      type=raw,value=${{ env.THEME_VERSION }}-kc${{ matrix.kc.line }},enable={{is_default_branch}}
                      type=raw,value=${{ env.THEME_VERSION }}-kc${{ matrix.kc.major }},enable={{is_default_branch}}

                      # ── Commit SHA, scoped to KC major ──
                      type=sha,prefix=sha-,suffix=-kc${{ matrix.kc.major }},format=short
                  labels: |
                      org.opencontainers.image.title=AisFlow Keycloak (theme ${{ env.THEME_VERSION }} · kc ${{ matrix.kc.version }})
                      org.opencontainers.image.description=Keycloak ${{ matrix.kc.version }} with AisFlow NavyStack UI theme ${{ env.THEME_VERSION }} baked in (start --optimized)
                      org.opencontainers.image.licenses=MIT
                      org.opencontainers.image.version=${{ env.THEME_VERSION }}-kc${{ matrix.kc.version }}
                      io.aisflow.keycloak.version=${{ matrix.kc.version }}
                      io.aisflow.keycloak.line=${{ matrix.kc.line }}
                      io.aisflow.keycloak.major=${{ matrix.kc.major }}
                      io.aisflow.keycloak.is_primary=${{ matrix.kc.is_primary }}
                      io.aisflow.theme.version=${{ env.THEME_VERSION }}
                      io.aisflow.theme.source=${{ needs.discover.outputs.theme_source }}
                      io.aisflow.combined.version=${{ env.THEME_VERSION }}-kc${{ matrix.kc.version }}

            # `latest` is intentionally excluded here — a dedicated
            # `promote-latest` job re-pushes it AFTER every other merge
            # finishes so its publish timestamp is the freshest, which
            # makes GHCR sort it at the top of the package's tag list.
            - name: Create manifest list and push (excluding :latest)
              working-directory: ${{ runner.temp }}/digests
              run: |
                  set -euo pipefail
                  latest_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
                  tags=$(jq -cr --arg latest "$latest_ref" \
                      '[.tags[] | select(. != $latest)] | map("-t " + .) | join(" ")' \
                      <<< "$DOCKER_METADATA_OUTPUT_JSON")
                  if [ -z "$tags" ]; then
                      echo "::notice::no non-latest tags to create — skipping"
                      exit 0
                  fi
                  # shellcheck disable=SC2086
                  docker buildx imagetools create $tags \
                      $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

            - name: Inspect first non-latest tag
              run: |
                  set -euo pipefail
                  latest_ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
                  first_tag=$(jq -cr --arg latest "$latest_ref" \
                      '[.tags[] | select(. != $latest)] | .[0] // empty' \
                      <<< "$DOCKER_METADATA_OUTPUT_JSON")
                  if [ -n "$first_tag" ]; then
                      docker buildx imagetools inspect "$first_tag"
                  fi

            - name: Summary
              run: |
                  {
                      echo "## kc${{ matrix.kc.major }} — ${{ matrix.kc.version }}${{ matrix.kc.is_primary && ' · **primary**' || '' }}"
                      echo ""
                      echo "Theme: \`${{ env.THEME_VERSION }}\` (${{ needs.discover.outputs.theme_source }})"
                      echo ""
                      echo "**Tags pushed (excluding \`:latest\`)**:"
                      echo '```'
                      echo "${{ steps.meta.outputs.tags }}"
                      echo '```'
                      if [[ "${{ matrix.kc.is_primary }}" == "true" && "$GITHUB_REF" == "refs/heads/${{ github.event.repository.default_branch }}" ]]; then
                          echo ""
                          echo "_\`:latest\` is promoted by the \`promote-latest\` job after all merges finish._"
                      fi
                  } >> "$GITHUB_STEP_SUMMARY"

    # ──────────────────────────────────────────────────────────────
    # Push `:latest` LAST so its publish timestamp is the most recent
    # across the package, keeping it at the top of GHCR's tag list
    # (GHCR sorts by recency). Skipped on tag pushes and PRs by the
    # same default-branch guard the `merge` step uses.
    # ──────────────────────────────────────────────────────────────
    promote-latest:
        name: Promote :latest tag
        needs: [discover, merge]
        if: ${{ inputs.push && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Download primary kc digests
              uses: actions/download-artifact@v8
              with:
                  path: ${{ runner.temp }}/digests
                  pattern: digests-${{ needs.discover.outputs.kc_primary }}-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Push :latest (final, on top of GHCR)
              working-directory: ${{ runner.temp }}/digests
              run: |
                  set -euo pipefail
                  ls -1
                  docker buildx imagetools create \
                      -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
                      $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

            - name: Inspect :latest
              run: |
                  docker buildx imagetools inspect \
                      "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            - name: Summary
              run: |
                  {
                      echo "## Promoted \`:latest\`"
                      echo ""
                      echo "\`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` was pushed after every other merge finished."
                      echo "GHCR sorts tags by recency, so this run pins \`:latest\` at the top of the package's tag list."
                  } >> "$GITHUB_STEP_SUMMARY"
